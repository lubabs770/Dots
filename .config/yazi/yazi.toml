[mgr]
ratio = [0,4,0]

show_hidden = true
show_symlink = true

[opener]
zed = [
	{ run = "zed %s", desc = "Zed", for = "macos", orphan = true },
]
vscode = [
	{ run = "code %s", desc = "VS Code", for = "macos", orphan = true },
]

[open]
prepend_rules = [
	{ url = "*/",               use = ["edit", "open", "zed", "vscode", "reveal"] },
	{ mime = "text/*",          use = ["edit", "zed", "vscode", "reveal"] },
	{ mime = "image/*",         use = ["open", "reveal"] },
	{ mime = "{audio,video}/*", use = ["play", "reveal"] },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = ["extract", "reveal"] },
	{ url = "*",                use = ["open", "zed", "vscode", "reveal"] },
]


