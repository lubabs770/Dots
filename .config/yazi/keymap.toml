[[mgr.prepend_keymap]]
on   = "j"
run  = "arrow -1"
desc = "Move up"

[[mgr.prepend_keymap]]
on   = "k"
run  = "arrow 1"
desc = "Move down"

[[mgr.prepend_keymap]]
on   = "l"
run  = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

[[mgr.prepend_keymap]]
on   = "T"
run  = "plugin preview-toggle"
desc = "Show or hide the preview pane"
